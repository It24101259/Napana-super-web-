<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Napana Super - Luxury Grocery Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Noto+Sans+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0c10;
            --bg-surface: #1f2833;
            --gold-light: #f39c12;
            --gold-gradient: linear-gradient(135deg, #d4af37 0%, #aa7c11 100%);
            --gold-glow: 0 0 15px rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-muted: #c5a880; /* Muted gold/beige */
            --radius-lg: 20px;
            --radius-md: 12px;
            --border-gold: 1px solid rgba(212, 175, 55, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', 'Noto Sans Sinhala', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            scroll-behavior: smooth;
        }

        /* --- LUXURY HEADER --- */
        header {
            background: rgba(11, 12, 16, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 999;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .store-logo-img {
            height: 55px;
            width: auto;
            border-radius: 50%;
            border: 2px solid #d4af37;
            box-shadow: var(--gold-glow);
        }

        .logo-text h1 {
            font-size: 22px;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-auth {
            padding: 12px 24px;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-customer-login {
            background: transparent;
            color: #ffffff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn-customer-login:hover {
            border-color: #d4af37;
            box-shadow: var(--gold-glow);
        }

        .btn-admin-login {
            background: var(--gold-gradient);
            color: #0b0c10;
            border: none;
        }

        .btn-admin-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        /* --- LUXURY HERO BANNER --- */
        .hero-banner {
            position: relative;
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)), url('https://i.ibb.co/ZzkZ21D5/0-FA322-F1-26-E1-49-A7-87-DF-2-BE3-ACCABCB6.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin: 25px;
            border-radius: var(--radius-lg);
            border: var(--border-gold);
            box-shadow: var(--gold-glow);
        }

        .hero-banner h2 {
            font-size: 50px;
            font-weight: 800;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .hero-banner p {
            font-size: 16px;
            margin: 15px 0 30px 0;
            color: #ffffff;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 500;
        }

        .btn-shop-now {
            background: var(--gold-gradient);
            color: #0b0c10;
            padding: 16px 40px;
            font-size: 15px;
            font-weight: 800;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-shop-now:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.5);
        }

        /* --- MAIN LAYOUT STYLING --- */
        .main-shop-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1fr 390px;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 1150px) {
            .main-shop-container { grid-template-columns: 1fr; padding: 0 20px; }
            .cart-sidebar-wrapper { display: none; }
        }

        /* CATEGORIES SCROLL BAR */
        .category-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 5px 20px 5px;
            margin-bottom: 35px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .cat-chip {
            background: var(--bg-surface);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 700;
            font-size: 13px;
            color: #a5b1c2;
            transition: all 0.2s ease;
        }

        .cat-chip:hover {
            border-color: rgba(212, 175, 55, 0.5);
            color: #ffffff;
        }

        .cat-chip.active {
            background: var(--gold-gradient);
            color: #0b0c10;
            font-weight: 800;
            box-shadow: var(--gold-glow);
        }

        /* --- PREMIUM BLACK & GOLD PRODUCT CARDS --- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .premium-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: var(--border-gold);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--gold-glow);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .p-img-container {
            width: 100%;
            height: 190px;
            background: #121921;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .p-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .premium-card:hover .p-img-container img {
            transform: scale(1.06);
        }

        .p-fallback-icon {
            font-size: 55px;
            color: rgba(212, 175, 55, 0.2);
        }

        .p-details-box {
            padding: 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .p-title {
            font-size: 17px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .v-selector-box {
            background: rgba(11, 12, 16, 0.5);
            border-radius: var(--radius-md);
            padding: 8px;
            margin-bottom: 18px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .v-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #e2e8f0;
        }
        .v-option input { accent-color: #d4af37; margin-right: 8px; }
        .v-opt-price { font-weight: 800; color: #f1c40f; }

        /* BUTTONS AND COUNTERS INSIDE CARD */
        .card-action-trigger {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-main-add {
            flex: 1;
            background: transparent;
            color: #ffffff;
            border: 1px solid #d4af37;
            padding: 14px;
            border-radius: var(--radius-md);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-main-add:hover {
            background: var(--gold-gradient);
            color: #0b0c10;
            box-shadow: var(--gold-glow);
        }

        .card-qty-counter {
            display: none; 
            align-items: center;
            justify-content: space-between;
            background: var(--gold-gradient);
            color: #0b0c10;
            padding: 11px 16px;
            border-radius: var(--radius-md);
            flex: 1;
            font-weight: 800;
            box-shadow: var(--gold-glow);
        }

        .card-qty-counter button {
            background: rgba(0, 0, 0, 0.15);
            border: none; color: #0b0c10; width: 26px; height: 26px;
            border-radius: 50%; font-size: 16px; font-weight: 900;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .card-qty-counter button:hover { background: rgba(0, 0, 0, 0.3); }

        /* --- GOLD ACCENTED SIDEBAR CART --- */
        .cart-sidebar-panel {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 30px;
            border: var(--border-gold);
            position: sticky;
            top: 100px;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 20px;
        }

        .cart-header h3 { font-size: 19px; font-weight: 800; color: #fff; }
        .cart-badge { background: #e74c3c; color: white; font-size: 12px; font-weight: 700; padding: 4px 1
